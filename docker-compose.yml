services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}"
    environment:
      - LAUNCH_SECRET=${LAUNCH_SECRET:-default-secret-change-me}
      - BACKEND_PORT=${BACKEND_PORT:-3000}

  frontend:
    build: frontend
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    environment:
      - VITE_API_URL=http://backend:${BACKEND_PORT:-3000}
    depends_on:
      - backend
